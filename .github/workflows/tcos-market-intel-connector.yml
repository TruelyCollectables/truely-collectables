name: TCOS Market Intel Connector

on:
  pull_request:
    paths:
      - "connectors/tcos-market-intel-mcp/**"
      - ".github/workflows/tcos-market-intel-connector.yml"
  push:
    branches: [main]
    paths:
      - "connectors/tcos-market-intel-mcp/**"
      - ".github/workflows/tcos-market-intel-connector.yml"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: connectors/tcos-market-intel-mcp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: connectors/tcos-market-intel-mcp/package.json
      - run: npm install
      - run: npm run check
