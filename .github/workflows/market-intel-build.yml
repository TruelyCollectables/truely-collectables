name: Market Intel Build

on:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate portable worker launchers
        shell: bash
        run: |
          set -euo pipefail
          node --check scripts/run-market-intel-worker-service.mjs
          node --check scripts/install-market-intel-worker-launchd.mjs
          node --check scripts/status-market-intel-worker-launchd.mjs
          node --check scripts/uninstall-market-intel-worker-launchd.mjs
          node --check scripts/prepare-market-intel-worker-env.mjs
          node --check scripts/simulate-market-intel-worker-env.mjs
          bash -n scripts/run-market-intel-worker-cycle.sh
          bash -n scripts/bootstrap-market-intel-worker-macos.sh
          node scripts/simulate-market-intel-worker-env.mjs
          node --import tsx --input-type=module -e "await import('./scripts/preflight-market-intel-worker.ts')"

      - name: Build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
          SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role-key
          NEXT_PUBLIC_SITE_URL: https://example.com
        shell: bash
        run: |
          set -o pipefail
          npm run build 2>&1 | tee market-intel-build.log

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: market-intel-build-log
          path: market-intel-build.log
          if-no-files-found: warn
